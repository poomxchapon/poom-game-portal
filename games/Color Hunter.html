<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortal XR Arena</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

    <style>
        /* --- PORTAL STYLES --- */
        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Share Tech Mono', monospace;
            overflow-x: hidden;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-jetbrains { font-family: 'JetBrains Mono', monospace; }

        /* Glitch Effect */
        .cyber-glitch { position: relative; }
        .cyber-glitch::before, .cyber-glitch::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #050505;
        }
        .cyber-glitch::before { left: 2px; text-shadow: -1px 0 #ff3300; clip: rect(44px, 450px, 56px, 0); animation: glitch-anim 5s infinite linear alternate-reverse; }
        .cyber-glitch::after { left: -2px; text-shadow: -1px 0 #ffff00; clip: rect(44px, 450px, 56px, 0); animation: glitch-anim2 5s infinite linear alternate-reverse; }
        @keyframes glitch-anim { 0% { clip: rect(12px, 9999px, 86px, 0); } 20% { clip: rect(65px, 9999px, 2px, 0); } 100% { clip: rect(59px, 9999px, 81px, 0); } }
        @keyframes glitch-anim2 { 0% { clip: rect(65px, 9999px, 100px, 0); } 20% { clip: rect(12px, 9999px, 21px, 0); } 100% { clip: rect(51px, 9999px, 12px, 0); } }

        /* Portal Scanline */
        .scanline { width: 100%; height: 100px; z-index: 10; background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(255, 204, 0, 0.05) 50%, rgba(0,0,0,0) 100%); opacity: 0.1; position: absolute; bottom: 100%; animation: scanline 10s linear infinite; pointer-events: none; }
        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100%; } }
        .bg-grid-pattern { background-image: linear-gradient(rgba(255, 204, 0, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 204, 0, 0.05) 1px, transparent 1px); background-size: 30px 30px; }
        .clip-corner { clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- GAME STYLES --- */
        .game-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            background: #0a0a2e;
        }

        .game-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        .game-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* Floating particles */
        .floating-particle {
            position: absolute;
            pointer-events: none;
            z-index: 2;
            animation: float-drift ease-in-out infinite;
        }

        @keyframes float-drift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); opacity: 0.35; }
            25% { transform: translate(40px, -60px) rotate(90deg); opacity: 0.65; }
            50% { transform: translate(-30px, 25px) rotate(180deg); opacity: 0.25; }
            75% { transform: translate(25px, -45px) rotate(270deg); opacity: 0.55; }
        }

        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(0,255,255,0.4)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 30px rgba(0,255,255,0.7)); transform: scale(1.03); }
        }

        @keyframes count-pop {
            0% { transform: scale(0.3); opacity: 0; }
            60% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes slide-up {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes energy-pulse {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.7; }
            50% { transform: scale(1.08) rotate(3deg); opacity: 1; }
        }

        @keyframes char-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes stroop-flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .tile-hit { animation: tile-flash 0.2s ease-out; }
        @keyframes tile-flash { 0% { background-color: white !important; transform: scale(1.15); } 100% { transform: scale(1); } }

        /* HUD bar backgrounds */
        .hud-bar {
            background-size: 100% 100%;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px 20px;
            min-width: 160px;
            height: 44px;
            border-radius: 8px;
        }

        /* Stroop hard mode indicator */
        .stroop-active {
            animation: stroop-flash 0.8s ease-in-out infinite;
        }

        /* Grid tile styles */
        .game-tile {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 4px;
            transition: all 0.075s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .game-tile:active { transform: scale(0.88); }
        .game-tile:hover { brightness: 1.2; }
    </style>
</head>
<body class="min-h-screen bg-[#050505] text-[#e0e0e0]">

                    <div class="w-10 h-10 bg-yellow-500/10 border border-yellow-400 flex items-center justify-center rotate-45 group-hover:rotate-0 transition-all duration-300">

                <div class="hidden md:flex items-center gap-8">

                    <a href="#" class="text-sm tracking-widest hover:text-yellow-400 transition-colors relative group">LEADERBOARD<span class="absolute -bottom-1 left-0 w-0 h-[2px] bg-yellow-400 group-hover:w-full transition-all duration-300"></span></a>
                </div>

                <div class="flex items-center gap-4">

        <!-- Main Content -->
        <main class="flex-grow container mx-auto px-4 py-8 z-10 relative">
            <section>
                <div class="flex flex-col md:flex-row justify-between items-end md:items-center mb-8 gap-4 border-b border-gray-800 pb-4">
                    <div class="flex flex-col gap-2 w-full md:w-auto">
                        <h2 class="text-2xl font-orbitron text-yellow-400 flex items-center gap-2">
                            <i class="ph ph-activity"></i> SIMULATION_LIST
                        </h2>
                        <div class="flex gap-2 overflow-x-auto pb-2 md:pb-0 scrollbar-hide" id="category-container"></div>
                    </div>

                    <div class="relative w-full md:w-64">
                        <input type="text" id="search-input" placeholder="SEARCH_PROTOCOL..." class="w-full bg-black border border-gray-700 p-2 pl-10 focus:outline-none focus:border-yellow-500 text-yellow-400 placeholder-gray-600 font-mono clip-corner" oninput="handleSearch(this.value)" />
                        <i class="ph ph-magnifying-glass absolute left-3 top-3 text-gray-600"></i>
                    </div>
                </div>
                <div id="game-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="border-t border-gray-800 bg-black py-8 mt-12 relative overflow-hidden">
            <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-2">
                    <i class="ph ph-cpu text-gray-600 text-xl"></i>
                    <span class="font-orbitron font-bold text-gray-500">FORTAL XR <span class="text-gray-700">CORP.</span></span>
                </div>
                <div class="text-xs text-gray-600 font-mono text-center md:text-right">
                    <p>COPYRIGHT &copy; 2077 FORTAL XR ARENA.</p>
                </div>
            </div>
            <div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-yellow-600 via-orange-600 to-red-600"></div>
        </footer>

        <!-- Modal -->
        <div id="game-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
            <div class="bg-zinc-900 border-2 border-yellow-500 w-full max-w-4xl relative shadow-[0_0_50px_rgba(234,179,8,0.2)] clip-corner">
                <button onclick="closeModal()" class="absolute top-0 right-0 p-4 text-gray-500 hover:text-white z-10">
                    <i class="ph ph-x text-3xl"></i>
                </button>
                <div class="flex flex-col md:flex-row h-full">
                    <div id="modal-image-container" class="h-64 md:h-auto w-full md:w-1/3 flex items-center justify-center relative overflow-hidden">
                        <i id="modal-icon" class="text-9xl text-black/40"></i>
                        <div class="absolute inset-0 bg-black/10 scanline"></div>
                    </div>
                    <div class="p-8 md:w-2/3 flex flex-col justify-between">
                        <div>
                            <div class="flex items-center gap-2 mb-2">
                                <span id="modal-category" class="bg-yellow-500 text-black px-2 font-bold text-xs"></span>
                                <span class="text-green-500 text-xs font-mono border border-green-900 px-2 bg-green-900/20">SERVER: STABLE</span>
                            </div>
                            <h2 id="modal-title" class="text-4xl font-orbitron font-bold text-white mb-4"></h2>
                            <p class="text-gray-400 mb-6 font-mono leading-relaxed">
                                Initializing request for <span id="modal-title-desc"></span>. Secure connection established.
                            </p>
                            <div class="grid grid-cols-3 gap-4 mb-8 border-t border-b border-gray-800 py-4">
                                <div class="text-center"><div class="text-xs text-gray-500">PLAYERS</div><div id="modal-players" class="text-xl font-bold text-yellow-400"></div></div>
                                <div class="text-center border-l border-gray-800"><div class="text-xs text-gray-500">PING</div><div class="text-xl font-bold text-green-400">12ms</div></div>
                                <div class="text-center border-l border-gray-800"><div class="text-xs text-gray-500">SIZE</div><div class="text-xl font-bold text-white">45 GB</div></div>
                            </div>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="launchColorHunter()" class="flex-1 bg-yellow-500 text-black py-4 font-bold text-lg hover:bg-yellow-400 hover:shadow-[0_0_20px_rgba(234,179,8,0.6)] transition-all clip-corner flex justify-center items-center gap-2">
                                <i class="ph ph-play-circle text-2xl"></i> LAUNCH GAME
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= GAME VIEW (COLOR HUNTER — REDESIGNED) ================= -->
    <div id="game-view" class="game-screen">
        <!-- Background image -->
        <div id="game-bg" class="game-bg"></div>

        <!-- Corner triangle decorations -->
        <img src="color-hunter-assets/Start/pic_logo.png" class="absolute inset-0 w-full h-full pointer-events-none z-[1] opacity-40" draggable="false">

        <!-- Floating particles container -->
        <div id="particles-container" class="absolute inset-0 pointer-events-none z-[2] overflow-hidden"></div>

        <!-- Main game content -->
        <main id="hunter-container" class="game-content"></main>
    </div>

    <!-- ================= SCRIPTS ================= -->
    <script>
        // --- PORTAL LOGIC ---
        const games = [{ id: 1, title: 'COLOR HUNTER', category: 'ACTION', rating: '5.0', players: 'NEW', status: 'ONLINE', imgGradient: 'from-pink-500 to-yellow-500', iconClass: 'ph-crosshair' }];
        const categories = ['ALL SYSTEMS', 'ACTION', 'RACING', 'PUZZLE', 'RPG'];
        let activeCategory = 'ALL SYSTEMS';
        let searchTerm = '';

        function initPortal() {
            renderCategories();
            renderGames();
        }

        function renderCategories() {
            const container = document.getElementById('category-container');
            if(!container) return;
            container.innerHTML = categories.map(cat => {
                const isActive = activeCategory === cat;
                return `<button onclick="setCategory('${cat}')" class="px-4 py-1 text-sm border clip-corner transition-all whitespace-nowrap ${isActive ? 'bg-yellow-500 border-yellow-500 text-black font-bold' : 'border-gray-800 hover:border-yellow-500 text-gray-500 hover:text-yellow-400'}">${cat}</button>`;
            }).join('');
        }

        function renderGames() {
            const grid = document.getElementById('game-grid');
            if(!grid) return;
            const filteredGames = games.filter(g => (activeCategory === 'ALL SYSTEMS' || g.category === activeCategory) && g.title.toLowerCase().includes(searchTerm.toLowerCase()));

            grid.innerHTML = filteredGames.map(game => `
                <div onclick="openModal(${game.id})" class="group relative bg-black/50 border border-gray-800 hover:border-yellow-500 transition-all duration-300 cursor-pointer overflow-hidden clip-corner">
                    <div class="h-48 w-full bg-gradient-to-br ${game.imgGradient} relative opacity-80 group-hover:opacity-100 transition-opacity">
                        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-30"></div>
                        <div class="absolute inset-0 flex items-center justify-center"><i class="ph ${game.iconClass} text-6xl text-black/50 group-hover:text-black/80 transition-all transform group-hover:scale-110 duration-500"></i></div>
                        <div class="absolute top-2 right-2 bg-black/90 px-2 py-1 text-xs font-bold border border-yellow-600/50 text-yellow-400">RATING: ${game.rating}</div>
                    </div>
                    <div class="p-5 relative">
                        <div class="absolute top-0 right-0 w-8 h-8 border-t-2 border-r-2 border-yellow-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <div class="absolute bottom-0 left-0 w-8 h-8 border-b-2 border-l-2 border-yellow-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <div class="flex justify-between items-start mb-2"><h3 class="text-xl font-bold font-orbitron group-hover:text-yellow-400 transition-colors">${game.title}</h3><span class="text-xs text-gray-500 border border-gray-800 px-1">${game.category}</span></div>
                        <div class="mt-4 h-0 overflow-hidden group-hover:h-10 transition-all duration-300"><button class="w-full bg-yellow-500/20 border border-yellow-500 text-yellow-400 py-1 hover:bg-yellow-500 hover:text-black font-bold transition-all uppercase text-sm tracking-wider">INITIALIZE</button></div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const game = games.find(g => g.id === id);
            if(!game) return;
            document.getElementById('modal-title').innerText = game.title;
            document.getElementById('modal-title-desc').innerText = game.title;
            document.getElementById('modal-category').innerText = game.category;
            document.getElementById('modal-players').innerText = game.players;
            document.getElementById('modal-image-container').className = `h-64 md:h-auto w-full md:w-1/3 flex items-center justify-center relative overflow-hidden bg-gradient-to-br ${game.imgGradient}`;
            document.getElementById('modal-icon').className = `ph ${game.iconClass} text-9xl text-black/40`;
            document.getElementById('game-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('game-modal').classList.add('hidden'); }
        function setCategory(cat) { activeCategory = cat; renderCategories(); renderGames(); }
        function handleSearch(val) { searchTerm = val; renderGames(); }
        function resetView() { closeModal(); activeCategory = 'ALL SYSTEMS'; searchTerm = ''; renderCategories(); renderGames(); }

        // --- GAME LAUNCHER ---
        function launchColorHunter() {
            closeModal();
            document.getElementById('portal-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            startColorHunterGame();
        }

        function exitToPortal() {
            if (hunterGame.gameLoopInterval) clearInterval(hunterGame.gameLoopInterval);
            if (hunterGame.roundLoopInterval) clearInterval(hunterGame.roundLoopInterval);
            if (hunterGame.countdownTimeout) clearTimeout(hunterGame.countdownTimeout);
            audioSystem.stopAll();
            // Restart to start screen (no portal)
            startColorHunterGame();
        }

        // ================= COLOR HUNTER GAME ENGINE (REDESIGNED) =================

        const ASSET = 'color-hunter-assets';
        const STROOP_THRESHOLD = 30; // Stroop effect activates when timeLeft <= this

        // ================= AUDIO SYSTEM =================
        const audioSystem = {
            bgmStart: null,
            bgmGameplay: null,
            audioCtx: null,

            init() {
                // BGM tracks
                this.bgmStart = new Audio(`${ASSET}/Music/Start Screen BGM.mp3`);
                this.bgmStart.loop = true;
                this.bgmStart.volume = 0.5;

                this.bgmGameplay = new Audio(`${ASSET}/Music/Game Play BGM.mp3`);
                this.bgmGameplay.loop = true;
                this.bgmGameplay.volume = 0.6;
            },

            getCtx() {
                if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
                return this.audioCtx;
            },

            playStartBGM() {
                this.stopAll();
                this.bgmStart.currentTime = 0;
                this.bgmStart.play().catch(() => {});
            },

            playGameplayBGM() {
                this.stopAll();
                this.bgmGameplay.currentTime = 0;
                this.bgmGameplay.play().catch(() => {});
            },

            fadeOutBGM(audio, duration = 800) {
                const startVol = audio.volume;
                const steps = 20;
                const interval = duration / steps;
                const volStep = startVol / steps;
                let current = 0;
                const fade = setInterval(() => {
                    current++;
                    audio.volume = Math.max(0, startVol - (volStep * current));
                    if (current >= steps) {
                        clearInterval(fade);
                        audio.pause();
                        audio.volume = startVol;
                    }
                }, interval);
            },

            stopAll() {
                [this.bgmStart, this.bgmGameplay].forEach(a => {
                    if (a) { a.pause(); a.currentTime = 0; }
                });
            },

            // --- SFX: Countdown beep (synthesized) ---
            playCountdownBeep(step) {
                const ctx = this.getCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (step > 0) {
                    // 3, 2, 1 — short beep
                    osc.type = 'sine';
                    osc.frequency.value = 520;
                    gain.gain.setValueAtTime(0.4, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.25);
                } else {
                    // GO — higher, longer beep
                    osc.type = 'sine';
                    osc.frequency.value = 880;
                    gain.gain.setValueAtTime(0.5, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 0.5);
                }
            },

            // --- SFX: Game Over buzzer ---
            playGameOverSFX() {
                const ctx = this.getCtx();

                // Descending buzzer tone
                const osc1 = ctx.createOscillator();
                const osc2 = ctx.createOscillator();
                const gain = ctx.createGain();

                osc1.connect(gain);
                osc2.connect(gain);
                gain.connect(ctx.destination);

                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(600, ctx.currentTime);
                osc1.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.8);

                osc2.type = 'square';
                osc2.frequency.setValueAtTime(590, ctx.currentTime);
                osc2.frequency.exponentialRampToValueAtTime(145, ctx.currentTime + 0.8);

                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.setValueAtTime(0.3, ctx.currentTime + 0.6);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.0);

                osc1.start(ctx.currentTime);
                osc2.start(ctx.currentTime);
                osc1.stop(ctx.currentTime + 1.0);
                osc2.stop(ctx.currentTime + 1.0);
            }
        };

        // Init audio on load
        audioSystem.init();

        const hunterGame = {
            BRIDGE_URL: 'http://localhost:3000',
            DEFAULT_CONFIG: {
                gridWidth: 10,
                gridHeight: 6,
                minRoundTime: 3000,
                maxRoundTime: 7000,
                gameDuration: 90,
                initialTargetCount: 4,
                colors: [
                    { name: 'RED',    hex: '#FF0033', charFile: 'RED',    textFile: 'Red' },
                    { name: 'GREEN',  hex: '#00FF66', charFile: 'Green',  textFile: 'Green' },
                    { name: 'BLUE',   hex: '#0066FF', charFile: 'Blue',   textFile: 'Blue' },
                    { name: 'YELLOW', hex: '#FFCC00', charFile: 'Yellow', textFile: 'Yellow' },
                    { name: 'PINK',   hex: '#FF00FF', charFile: 'Pink',   textFile: 'Pink' },
                    { name: 'CYAN',   hex: '#00FFFF', charFile: 'Cyan',   textFile: 'Cyan' },
                    { name: 'ORANGE', hex: '#FF8800', charFile: 'Orange', textFile: 'Orange' },
                    { name: 'PURPLE', hex: '#8800FF', charFile: 'Purple', textFile: 'Purrle' },
                ]
            },
            state: {
                appState: 'START',
                score: 0,
                timeLeft: 0,
                targetColor: null,
                gridColors: [],
                roundProgress: 0,
                combo: 0,
                isConnected: false,
                stroopActive: false
            },
            tileManager: null,
            socket: null,
            gameLoopInterval: null,
            roundLoopInterval: null,
            countdownTimeout: null,
            roundStartTime: 0
        };

        // --- Asset path helpers ---
        function getCharacterSrc(color) {
            return `${ASSET}/GamePlay/${color.charFile}.png`;
        }

        function getTextSrc(color, useStroop) {
            if (!useStroop) {
                return `${ASSET}/GamePlay/Text_ture/${color.textFile}.png`;
            }
            const isFake1 = Math.random() < 0.5;
            const dir = isFake1 ? 'Text_Fake1' : 'Text_Fake2';
            const suffix = isFake1 ? '1' : '2';
            return `${ASSET}/GamePlay/${dir}/${color.textFile}${suffix}.png`;
        }

        // --- Tile Manager (unchanged engine) ---
        class BeatTileManagerJS {
            constructor(width, height) { this.width = width; this.height = height; this.tiles = new Array(width * height).fill('#000000'); }
            randomizeBoard(targetColorHex) {
                this.tiles.fill('#000000');
                for (let i = 0; i < this.tiles.length; i++) {
                    if (Math.random() < 0.15) {
                        const randomCol = hunterGame.DEFAULT_CONFIG.colors[Math.floor(Math.random() * hunterGame.DEFAULT_CONFIG.colors.length)];
                        if (randomCol.hex !== targetColorHex) this.tiles[i] = randomCol.hex;
                    }
                }
                let placed = 0, attempts = 0;
                while (placed < hunterGame.DEFAULT_CONFIG.initialTargetCount && attempts < 100) {
                    const idx = Math.floor(Math.random() * this.tiles.length);
                    if (this.tiles[idx] !== targetColorHex) { this.tiles[idx] = targetColorHex; placed++; }
                    attempts++;
                }
                return [...this.tiles];
            }
            checkTile(index, targetColorHex) { return index >= 0 && index < this.tiles.length && this.tiles[index] === targetColorHex; }
            respawnTarget(hitIndex, targetColorHex) {
                this.tiles[hitIndex] = '#000000';
                let bestSpot = -1, maxDist = -1;
                const hitX = hitIndex % this.width, hitY = Math.floor(hitIndex / this.width);
                for (let i = 0; i < 20; i++) {
                    const candidate = Math.floor(Math.random() * this.tiles.length);
                    if (this.tiles[candidate] !== targetColorHex && candidate !== hitIndex) {
                        const cX = candidate % this.width, cY = Math.floor(candidate / this.width);
                        const dist = Math.sqrt(Math.pow(cX - hitX, 2) + Math.pow(cY - hitY, 2));
                        if (dist > maxDist) { maxDist = dist; bestSpot = candidate; }
                    }
                }
                if (bestSpot === -1) { let safety = 0; do { bestSpot = Math.floor(Math.random() * this.tiles.length); safety++; } while (this.tiles[bestSpot] === targetColorHex && safety < 100); }
                this.tiles[bestSpot] = targetColorHex;
                return [...this.tiles];
            }
        }

        // --- Particle System ---
        function generateParticles() {
            const container = document.getElementById('particles-container');
            if (!container) return;
            container.innerHTML = '';
            const particleImages = [
                `${ASSET}/Start/Particle1.png`,
                `${ASSET}/Start/Particle2.png`,
                `${ASSET}/Start/Particle3.png`,
                `${ASSET}/Start/Particle4.png`,
            ];
            for (let i = 0; i < 14; i++) {
                const img = document.createElement('img');
                img.src = particleImages[i % 4];
                img.className = 'floating-particle';
                img.draggable = false;
                img.style.left = `${Math.random() * 85 + 5}%`;
                img.style.top = `${Math.random() * 85 + 5}%`;
                img.style.width = `${20 + Math.random() * 50}px`;
                img.style.animationDelay = `${Math.random() * 10}s`;
                img.style.animationDuration = `${8 + Math.random() * 14}s`;
                container.appendChild(img);
            }
        }

        // --- Helpers ---
        function formatTime(seconds) {
            return `${Math.floor(seconds / 60)}:${(seconds % 60).toString().padStart(2, '0')}`;
        }

        function getHunterContainer() {
            return document.getElementById('hunter-container');
        }

        // --- Socket (background, no UI) ---
        function initSocket() {
            try {
                hunterGame.socket = io(hunterGame.BRIDGE_URL);
                hunterGame.socket.on('connect', () => { hunterGame.state.isConnected = true; });
                hunterGame.socket.on('disconnect', () => { hunterGame.state.isConnected = false; });
            } catch (e) { console.warn("Socket.io connection failed — running in simulation mode."); }
        }

        // ================= GAME FLOW =================

        function startColorHunterGame() {
            hunterGame.tileManager = new BeatTileManagerJS(hunterGame.DEFAULT_CONFIG.gridWidth, hunterGame.DEFAULT_CONFIG.gridHeight);
            hunterGame.state.targetColor = hunterGame.DEFAULT_CONFIG.colors[0];
            hunterGame.state.appState = 'START';
            hunterGame.state.score = 0;
            hunterGame.state.combo = 0;
            hunterGame.state.stroopActive = false;

            // Set BG
            document.getElementById('game-bg').style.backgroundImage = `url('${ASSET}/Start/BG.png')`;

            generateParticles();
            renderStartScreen();
            audioSystem.playStartBGM();
            initSocket();
        }

        // ===== 1. START SCREEN =====
        function renderStartScreen() {
            getHunterContainer().innerHTML = `
                <div class="flex flex-col items-center justify-center gap-4 relative w-full h-full">
                    <!-- Character: Blue (top-right decorative) -->
                    <img src="${ASSET}/Start/Blue.png" draggable="false"
                         class="absolute top-[8%] right-[8%] w-24 md:w-32 opacity-90"
                         style="animation: float-drift 7s ease-in-out infinite; filter: drop-shadow(0 0 20px rgba(0,102,255,0.6));">

                    <!-- Logo -->
                    <img src="${ASSET}/Start/Logo.png" draggable="false"
                         class="w-[280px] md:w-[400px] lg:w-[460px] drop-shadow-2xl"
                         style="animation: pulse-glow 3s ease-in-out infinite;">

                    <!-- Characters: Red & Green -->
                    <div class="flex items-end gap-20 md:gap-36 mt-1">
                        <img src="${ASSET}/Start/RED_.png" draggable="false"
                             class="w-20 md:w-28 opacity-90"
                             style="animation: float-drift 8s ease-in-out infinite 1.5s; filter: drop-shadow(0 0 20px rgba(255,0,51,0.6));">
                        <img src="${ASSET}/Start/Green.png" draggable="false"
                             class="w-20 md:w-28 opacity-90"
                             style="animation: float-drift 9s ease-in-out infinite 3s; filter: drop-shadow(0 0 20px rgba(0,255,102,0.6));">
                    </div>

                    <!-- START button -->
                    <button onclick="startCountdown()"
                            class="mt-8 bg-white hover:bg-cyan-300 text-[#0a0a2e] text-3xl md:text-4xl font-black py-4 px-16 md:px-20 rounded-2xl transition-all duration-300 hover:scale-110 shadow-[0_0_40px_rgba(255,255,255,0.25)] hover:shadow-[0_0_60px_rgba(0,255,255,0.5)] tracking-[0.15em] select-none">
                        START
                    </button>

                    <!-- Subtitle -->
                    <p class="text-cyan-400/70 text-xs md:text-sm tracking-[0.4em] uppercase mt-1">Single Lane</p>
                </div>
            `;
        }

        // ===== 2. COUNTDOWN SCREEN =====
        function startCountdown() {
            hunterGame.state.appState = 'COUNTDOWN';

            // Fade out start BGM
            audioSystem.fadeOutBGM(audioSystem.bgmStart, 600);

            const countBGs = [
                `${ASSET}/Count/BG_Count.png`,
                `${ASSET}/Count/BG_Count2.png`,
                `${ASSET}/Count/BG_Count3.png`,
            ];
            const countNums = [
                `${ASSET}/Count/3.png`,
                `${ASSET}/Count/2.png`,
                `${ASSET}/Count/1.png`,
            ];

            let step = 0;

            const showStep = () => {
                if (hunterGame.state.appState !== 'COUNTDOWN') return;

                if (step >= 3) {
                    audioSystem.playCountdownBeep(0); // GO beep
                    beginGameplay();
                    return;
                }

                // Beep for each countdown number
                audioSystem.playCountdownBeep(3 - step);

                getHunterContainer().innerHTML = `
                    <div class="flex flex-col items-center justify-center" style="animation: count-pop 0.35s ease-out;">
                        <div class="relative flex items-center justify-center" style="width: 280px; height: 280px;">
                            <img src="${countBGs[step]}" draggable="false"
                                 class="absolute inset-0 w-full h-full object-contain"
                                 style="filter: drop-shadow(0 0 40px rgba(66,133,244,0.5));">
                            <img src="${countNums[step]}" draggable="false"
                                 class="relative z-10 h-[55%] object-contain"
                                 style="filter: drop-shadow(0 0 15px rgba(255,255,255,0.6));">
                        </div>
                    </div>
                `;

                step++;
                hunterGame.countdownTimeout = setTimeout(showStep, 1000);
            };

            showStep();
        }

        // ===== 3. GAMEPLAY SCREEN =====
        function beginGameplay() {
            hunterGame.state.appState = 'PLAYING';
            hunterGame.state.timeLeft = hunterGame.DEFAULT_CONFIG.gameDuration;
            hunterGame.state.score = 0;
            hunterGame.state.combo = 0;
            hunterGame.state.stroopActive = false;

            // Switch BG to gameplay
            document.getElementById('game-bg').style.backgroundImage = `url('${ASSET}/GamePlay/BG.png')`;

            // Start gameplay BGM
            audioSystem.playGameplayBGM();

            renderGameplay();
            startRoundLogic();

            if (hunterGame.gameLoopInterval) clearInterval(hunterGame.gameLoopInterval);
            hunterGame.gameLoopInterval = setInterval(() => {
                hunterGame.state.timeLeft--;

                // Activate Stroop effect when time is running low
                if (hunterGame.state.timeLeft <= STROOP_THRESHOLD && !hunterGame.state.stroopActive) {
                    hunterGame.state.stroopActive = true;
                    const indicator = document.getElementById('stroop-indicator');
                    if (indicator) indicator.style.opacity = '1';
                }

                if (hunterGame.state.timeLeft <= 0) {
                    endGame();
                } else {
                    updateTimerUI();
                }
            }, 1000);
        }

        function renderGameplay() {
            getHunterContainer().innerHTML = `
                <div class="w-full h-full flex flex-col">
                    <!-- HUD Bar -->
                    <div class="flex items-center justify-between px-3 md:px-6 pt-3 pb-2 z-20 relative">
                        <!-- Logo (left) -->
                        <img src="${ASSET}/GamePlay/ColotHunter.png" draggable="false"
                             class="h-10 md:h-14 object-contain drop-shadow-lg flex-shrink-0">

                        <!-- TIME (center) -->
                        <div class="hud-bar flex-shrink-0" style="background-image: url('${ASSET}/GamePlay/BG_Time.png');">
                            <span class="text-white font-black text-lg md:text-2xl tracking-wider drop-shadow-lg" id="timer-display">
                                ${formatTime(hunterGame.state.timeLeft)}
                            </span>
                        </div>

                        <!-- SCORE (right) -->
                        <div class="hud-bar flex-shrink-0" style="background-image: url('${ASSET}/GamePlay/BG_Score.png');">
                            <span class="text-white font-black text-lg md:text-2xl tracking-wider drop-shadow-lg" id="score-display">
                                ${hunterGame.state.score.toLocaleString()}
                            </span>
                        </div>
                    </div>

                    <!-- Character Display Area -->
                    <div class="flex-1 flex flex-col items-center justify-center relative min-h-0 py-2">
                        <!-- Stroop hard mode indicator -->
                        <div id="stroop-indicator" class="absolute top-1 left-1/2 -translate-x-1/2 text-xs text-red-400 font-bold tracking-[0.3em] transition-opacity duration-500 stroop-active" style="opacity: 0;">
                            HARD MODE
                        </div>

                        <!-- Color name text image -->
                        <img id="color-text-img" src="" draggable="false"
                             class="h-12 md:h-20 lg:h-24 object-contain mb-1 drop-shadow-lg"
                             style="animation: slide-up 0.25s ease-out;">

                        <!-- Energy burst + Character mascot -->
                        <div class="relative flex items-center justify-center mt-1">
                            <img id="energy-burst" src="${ASSET}/GamePlay/BG_Character.png" draggable="false"
                                 class="absolute w-[200px] md:w-[300px] lg:w-[350px] object-contain opacity-80"
                                 style="animation: energy-pulse 2s ease-in-out infinite;">
                            <img id="character-img" src="" draggable="false"
                                 class="relative z-10 w-[110px] md:w-[160px] lg:w-[200px] object-contain"
                                 style="animation: char-bounce 1.5s ease-in-out infinite;">
                        </div>

                        <!-- Round progress bar -->
                        <div class="w-40 md:w-56 h-2 bg-white/10 rounded-full mt-3 overflow-hidden border border-white/5">
                            <div id="round-bar" class="h-full bg-gradient-to-r from-cyan-400 to-purple-500 rounded-full transition-all duration-100 ease-linear" style="width: 100%"></div>
                        </div>

                        <!-- Combo display -->
                        <div id="combo-display" class="text-yellow-400 text-base md:text-lg font-black mt-2 h-6 transition-all duration-200"></div>
                    </div>

                    <!-- Grid (simulation panel — smaller, below main display) -->
                    <div class="flex justify-center pb-3 px-3">
                        <div id="game-grid-hunter"
                             class="grid gap-[3px] p-3 bg-black/50 backdrop-blur-sm rounded-xl border border-white/10 w-full max-w-2xl"
                             style="grid-template-columns: repeat(${hunterGame.DEFAULT_CONFIG.gridWidth}, minmax(0, 1fr));">
                        </div>
                    </div>
                </div>
            `;
            updateGameplayUI();
        }

        function updateGameplayUI() {
            const textImg = document.getElementById('color-text-img');
            const charImg = document.getElementById('character-img');

            if (textImg && charImg) {
                const color = hunterGame.state.targetColor;
                charImg.src = getCharacterSrc(color);
                charImg.style.filter = `drop-shadow(0 0 25px ${color.hex}80)`;
                textImg.src = getTextSrc(color, hunterGame.state.stroopActive);

                // Tint energy burst
                const burst = document.getElementById('energy-burst');
                if (burst) burst.style.filter = `drop-shadow(0 0 30px ${color.hex}50)`;
            }

            updateGridUI();
            updateScoreUI();
        }

        function updateGridUI() {
            const gridEl = document.getElementById('game-grid-hunter');
            if (!gridEl) return;
            gridEl.innerHTML = '';
            hunterGame.state.gridColors.forEach((color, index) => {
                const btn = document.createElement('button');
                btn.id = `tile-${index}`;
                const isTarget = color === hunterGame.state.targetColor.hex;
                btn.className = `game-tile ${isTarget ? 'animate-pulse' : ''}`;
                btn.style.backgroundColor = color;
                if (color !== '#000000') {
                    btn.style.boxShadow = `inset 0 0 4px ${color}60, 0 0 ${isTarget ? '12' : '6'}px ${color}40`;
                }
                btn.onmousedown = () => handleInputTrigger(index);
                btn.ontouchstart = (e) => { e.preventDefault(); handleInputTrigger(index); };
                gridEl.appendChild(btn);
            });
        }

        function updateScoreUI() {
            const scoreEl = document.getElementById('score-display');
            const comboEl = document.getElementById('combo-display');
            if (scoreEl) scoreEl.innerText = hunterGame.state.score.toLocaleString();
            if (comboEl) {
                if (hunterGame.state.combo > 1) {
                    comboEl.innerText = `COMBO x${hunterGame.state.combo}`;
                    comboEl.style.opacity = '1';
                    comboEl.style.transform = 'scale(1.1)';
                    setTimeout(() => { if (comboEl) comboEl.style.transform = 'scale(1)'; }, 150);
                } else {
                    comboEl.innerText = '';
                    comboEl.style.opacity = '0';
                }
            }
        }

        function updateTimerUI() {
            const t = document.getElementById('timer-display');
            if (t) {
                t.innerText = formatTime(hunterGame.state.timeLeft);
                // Red warning when time is low
                if (hunterGame.state.timeLeft <= 10) {
                    t.style.color = '#FF3333';
                    t.style.textShadow = '0 0 15px rgba(255,50,50,0.7)';
                } else if (hunterGame.state.timeLeft <= STROOP_THRESHOLD) {
                    t.style.color = '#FFaa33';
                    t.style.textShadow = '0 0 10px rgba(255,170,50,0.5)';
                }
            }
        }

        function updateProgressBarUI() {
            const b = document.getElementById('round-bar');
            if (b) b.style.width = `${100 - hunterGame.state.roundProgress}%`;
        }

        // --- Round Logic ---
        function startRoundLogic() {
            let currentRoundDuration = 0;

            const runRound = () => {
                currentRoundDuration = Math.floor(Math.random() * (hunterGame.DEFAULT_CONFIG.maxRoundTime - hunterGame.DEFAULT_CONFIG.minRoundTime + 1)) + hunterGame.DEFAULT_CONFIG.minRoundTime;
                const newTarget = hunterGame.DEFAULT_CONFIG.colors[Math.floor(Math.random() * hunterGame.DEFAULT_CONFIG.colors.length)];
                hunterGame.state.targetColor = newTarget;
                hunterGame.state.gridColors = hunterGame.tileManager.randomizeBoard(newTarget.hex);
                hunterGame.roundStartTime = Date.now();
                updateGameplayUI();
            };

            runRound();

            if (hunterGame.roundLoopInterval) clearInterval(hunterGame.roundLoopInterval);
            hunterGame.roundLoopInterval = setInterval(() => {
                const elapsed = Date.now() - hunterGame.roundStartTime;
                hunterGame.state.roundProgress = Math.min((elapsed / currentRoundDuration) * 100, 100);
                updateProgressBarUI();
                if (elapsed >= currentRoundDuration) runRound();
            }, 50);
        }

        // --- Input Handling ---
        function handleInputTrigger(index) {
            if (hunterGame.state.appState !== 'PLAYING') return;

            const isCorrect = hunterGame.tileManager.checkTile(index, hunterGame.state.targetColor.hex);
            if (isCorrect) {
                hunterGame.state.score += (100 + (hunterGame.state.combo * 10));
                hunterGame.state.combo++;
                hunterGame.state.gridColors = hunterGame.tileManager.respawnTarget(index, hunterGame.state.targetColor.hex);

                const tileEl = document.getElementById(`tile-${index}`);
                if (tileEl) {
                    tileEl.style.backgroundColor = '#FFFFFF';
                    tileEl.classList.add('tile-hit');
                    setTimeout(() => tileEl.classList.remove('tile-hit'), 200);
                }
                setTimeout(() => { if (hunterGame.state.appState === 'PLAYING') updateGridUI(); }, 50);
            } else {
                hunterGame.state.combo = 0;
                hunterGame.state.score = Math.max(0, hunterGame.state.score - 50);
            }
            updateScoreUI();
        }

        // --- End Game ---
        function endGame() {
            clearInterval(hunterGame.gameLoopInterval);
            clearInterval(hunterGame.roundLoopInterval);
            hunterGame.state.appState = 'GAMEOVER';

            // Stop gameplay BGM + play game over buzzer
            audioSystem.fadeOutBGM(audioSystem.bgmGameplay, 500);
            setTimeout(() => audioSystem.playGameOverSFX(), 300);

            renderGameOver();
        }

        // ===== 4. RESULT SCREEN =====
        function renderGameOver() {
            // Switch BG to result
            document.getElementById('game-bg').style.backgroundImage = `url('${ASSET}/Result/BG.png')`;

            getHunterContainer().innerHTML = `
                <div class="flex flex-col items-center justify-center gap-4 w-full h-full relative">
                    <!-- Logo (top-left) -->
                    <img src="${ASSET}/Result/ColotHunter.png" draggable="false"
                         class="fixed top-4 left-4 h-10 md:h-14 object-contain drop-shadow-lg z-50">

                    <!-- TIME'S UP -->
                    <img src="${ASSET}/Result/Group 49.png" draggable="false"
                         class="w-[320px] md:w-[500px] lg:w-[600px] object-contain drop-shadow-2xl"
                         style="animation: count-pop 0.5s ease-out; filter: drop-shadow(0 0 30px rgba(255,50,0,0.4));">

                    <!-- YOUR SCORE -->
                    <img src="${ASSET}/Result/YoUR SCORE.png" draggable="false"
                         class="w-[200px] md:w-[300px] lg:w-[350px] object-contain mt-4"
                         style="animation: slide-up 0.5s ease-out 0.3s both;">

                    <!-- Score number -->
                    <div class="text-5xl md:text-7xl lg:text-8xl font-black text-white mt-2 tracking-wider"
                         style="animation: slide-up 0.5s ease-out 0.5s both; text-shadow: 0 0 30px rgba(255,255,255,0.3), 0 4px 20px rgba(0,0,0,0.5);">
                        ${hunterGame.state.score.toLocaleString()}
                    </div>

                    <!-- Buttons (appear after delay) -->
                    <div id="result-buttons" class="flex gap-5 mt-8 opacity-0 transition-opacity duration-700">
                        <button onclick="restartGame()"
                                class="bg-white hover:bg-cyan-300 text-[#0a0a2e] text-lg md:text-xl font-black py-3 px-10 rounded-xl transition-all duration-300 hover:scale-110 shadow-[0_0_30px_rgba(255,255,255,0.2)] tracking-wider">
                            RESTART
                        </button>
                        <button onclick="exitToPortal()"
                                class="bg-white/10 hover:bg-red-500/40 text-white text-lg md:text-xl font-bold py-3 px-10 rounded-xl border border-white/20 transition-all duration-300 hover:scale-110 tracking-wider">
                            EXIT
                        </button>
                    </div>
                </div>
            `;

            // Show buttons after 3 seconds
            setTimeout(() => {
                const btns = document.getElementById('result-buttons');
                if (btns) btns.style.opacity = '1';
            }, 3000);
        }

        function restartGame() {
            if (hunterGame.gameLoopInterval) clearInterval(hunterGame.gameLoopInterval);
            if (hunterGame.roundLoopInterval) clearInterval(hunterGame.roundLoopInterval);
            audioSystem.stopAll();
            hunterGame.state.score = 0;
            hunterGame.state.combo = 0;
            document.getElementById('game-bg').style.backgroundImage = `url('${ASSET}/Start/BG.png')`;
            renderStartScreen();
            audioSystem.playStartBGM();
        }

        // Launch game directly (skip portal)
        startColorHunterGame();
    </script>
</body>
</html>
